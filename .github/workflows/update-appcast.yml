name: Auto-Update Sparkle Appcast

on:
  release:
    types: [published]

# 🌟 FIX 1: Explicitly grant the GitHub actions bot permission to write data back to your repo
permissions:
  contents: write

jobs:
  update-appcast:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 🌟 FIX 2: Force the runner onto a live branch so it is NEVER in a detached HEAD state!
          ref: main  

      # ... (Your steps here that download/run your generate_appcast binary tool) ...

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: auto-update appcast.xml [skip ci]" || exit 0
          
          # 🌟 FIX 3: Push cleanly directly back into the live branch
          git push origin main
